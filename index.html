<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnStyle+ | EAC STEM 6</title>
    <style>
        :root {
            --accent-pink: #E91E63;
            --maroon: #800000;
            --bg-light: #fdf2f8;
            --text-color: #000;
            --card-bg: #fff;
            --pattern-color: #f8bbd0;
        }

        .dark-mode {
            --accent-pink: #2196F3; 
            --bg-light: #000000;    
            --text-color: #ffffff;  
            --card-bg: #1a1a1a;
            --pattern-color: #333;
        }

        body { 
            font-family: 'Arial Black', sans-serif; 
            margin: 0; padding: 0;
            background-color: var(--bg-light); 
            color: var(--text-color);
            background-image: linear-gradient(135deg, var(--pattern-color) 25%, transparent 25%), 
                              linear-gradient(225deg, var(--pattern-color) 25%, transparent 25%), 
                              linear-gradient(45deg, var(--pattern-color) 25%, transparent 25%), 
                              linear-gradient(315deg, var(--pattern-color) 25%, var(--bg-light) 25%);
            background-position: 10px 0, 10px 0, 0 0, 0 0;
            background-size: 20px 20px;
            transition: 0.4s;
        }

        header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--card-bg); border-bottom: 3px solid var(--text-color); 
            position: sticky; top: 0; z-index: 1000;
        }

        .section { display: none; opacity: 0; transition: opacity 0.5s ease; padding: 20px 5%; }
        .section.active { display: block; opacity: 1; }

        .survey-card { background: var(--card-bg); border: 3px solid var(--text-color); padding: 30px; max-width: 850px; margin: 0 auto; }
        
        .q-wrapper { 
            background: rgba(0,0,0,0.03); 
            padding: 25px; 
            border-radius: 15px; 
            border: 2px solid #ddd; 
            margin-bottom: 30px; 
        }
        
        .option-box { 
            display: block; background: #fff; margin: 10px 0; padding: 15px; 
            border: 2px solid #ddd; border-radius: 10px; cursor: pointer; transition: 0.2s;
            font-family: Arial; font-weight: bold; color: #333;
        }

        .option-box:hover { background: var(--bg-light); border-color: var(--accent-pink); transform: translateX(5px); }
        .option-box input { margin-right: 15px; }

        .admin-btn { background: var(--maroon); color: white; padding: 18px; border: none; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; }
        .progress-bar { height: 10px; background: var(--accent-pink); width: 0%; position: fixed; top: 0; left: 0; z-index: 2000; transition: 0.3s; }

        #privacyModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-box { background: var(--card-bg); padding: 40px; max-width: 450px; border: 6px solid var(--accent-pink); text-align: center; box-shadow: 10px 10px 0px var(--text-color); }
    </style>
</head>
<body>

<div id="pBar" class="progress-bar"></div>

<div id="privacyModal">
    <div class="modal-box">
        <h2 style="color: var(--accent-pink);">PRIVACY NOTICE</h2>
        <p style="font-family: Arial; font-weight: bold;">Your data is used for academic research by Group Technology 1.</p>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="admin-btn" style="background: #777;" onclick="closeModal()">BACK</button>
            <button class="admin-btn" onclick="confirmProceed()">PROCEED</button>
        </div>
    </div>
</div>

<header>
    <div onclick="nav('pg1')" style="cursor:pointer;">
        <div style="font-size: 22px; font-weight: 900; line-height: 1;">LEARNSTYLE+<br>.COM</div>
    </div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <span onclick="nav('pg1')" style="cursor:pointer; font-weight: 900;">HOME</span>
        <span onclick="nav('pg2')" style="cursor:pointer; font-weight: 900;">SURVEY</span>
        <button onclick="toggleDark()" style="cursor:pointer; font-weight: 900; background: none; border: 2px solid var(--text-color);">MODE</button>
    </div>
</header>

<div id="pg1" class="section active">
    <div class="survey-card" style="text-align: center;">
        <h1>LEARN YOUR STYLE!</h1>
        <p>IDENTIFY YOUR LEARNING STYLE THROUGH 25 RESEARCH QUESTIONS.</p>
        <button class="admin-btn" onclick="nav('pg2')">START PROFILE</button>
    </div>
</div>

<div id="pg2" class="section">
    <div class="survey-card">
        <h2>STUDENT PROFILE</h2>
        <label>FULL NAME (OPTIONAL)</label>
        <input type="text" id="stuName" style="width:100%; padding:15px; margin:10px 0 20px; border:3px solid black; box-sizing: border-box;">
        <label>AGE *</label>
        <input type="number" id="stuAge" style="width:100%; padding:15px; margin:10px 0 20px; border:3px solid black; box-sizing: border-box;">
        <label>GENDER *</label>
        <select id="stuGender" style="width:100%; padding:15px; margin:10px 0 30px; border:3px solid black; box-sizing: border-box;">
            <option value="" disabled selected>-- Select --</option>
            <option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
        </select>
        <button class="admin-btn" onclick="validate()">GO TO QUESTIONS</button>
    </div>
</div>

<div id="pg3" class="section">
    <div class="survey-card">
        <h2>QUESTIONNAIRE</h2>
        <form id="styleForm" onchange="updateProg()">
            <div id="q-container"></div>
            <button type="button" class="admin-btn" id="finishBtn" onclick="finish()">SUBMIT & SEE RESULT</button>
        </form>
        <div id="resBox" style="display:none; margin-top: 40px; border: 5px solid var(--text-color); padding: 30px; text-align: center;">
            <h2 id="resTitle" style="color: var(--accent-pink);"></h2>
            <p id="resDesc" style="font-family: Arial; font-weight: bold;"></p>
            <button onclick="location.reload()" class="admin-btn" style="width:auto; padding: 15px 30px;">RETAKE</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE"; 

    const questions = [
        { q: "When learning something new, do you prefer to:", v: "Watch a video or diagram", a: "Listen to a verbal explanation", p: "Discuss it with a study group", i: "Read the material solo" },
        { q: "How do you best remember a long list?", v: "By visualizing the items", a: "By repeating them out loud", p: "By having someone quiz you", i: "By writing them down privately" },
        { q: "When solving a math problem, you usually:", v: "Draw out the steps or shapes", a: "Talk yourself through the logic", p: "Ask a classmate for their method", i: "Solve it quietly by yourself" },
        { q: "In a classroom setting, you focus best when:", v: "The teacher uses a projector/board", a: "The teacher gives a clear lecture", p: "There are group activities", i: "There is silent individual work" },
        { q: "When you are confused, your first instinct is to:", v: "Look for a picture or chart", a: "Ask the teacher to repeat it", p: "Ask the person sitting next to you", i: "Check your textbook or notes" },
        { q: "What helps you memorize facts best?", v: "Flashcards with different colors", a: "Recording your voice and playing it", p: "Teaching the facts to a friend", i: "Repeatedly reading in a quiet room" },
        { q: "During a presentation, you notice:", v: "The slides and images used", a: "The speaker's tone and words", p: "How the audience is reacting", i: "The depth of the information" },
        { q: "When following directions, you prefer:", v: "A map or a set of drawings", a: "Spoken instructions", p: "Being guided by a partner", i: "A written list of steps" },
        { q: "What is your favorite way to brainstorm?", v: "Drawing a mind map", a: "Talking ideas out loud", p: "Group discussion/Debate", i: "Reflecting and writing alone" },
        { q: "When you read for fun, you enjoy:", v: "Books with many illustrations", a: "Audiobooks or being read to", p: "Discussing the plot with others", i: "Getting lost in a book by yourself" },
        { q: "How do you prefer to handle school projects?", v: "Creating a poster or presentation", a: "Giving an oral report", p: "Dividing tasks with a team", i: "Doing the research and writing solo" },
        { q: "When you meet someone new, you remember:", v: "Their face and what they wore", a: "Their name and what they said", p: "How comfortable the chat was", i: "Your personal impression of them" },
        { q: "What is the biggest distraction for you?", v: "A messy or cluttered room", a: "Loud or sudden noises", p: "Feeling isolated from friends", i: "People interrupting your focus" },
        { q: "How do you prefer to learn a new skill?", v: "Seeing a demonstration", a: "Listening to a podcast/lecture", p: "Practicing with a coach or peer", i: "Trying it out on your own" },
        { q: "When taking a test, you tend to:", v: "Recall where the info was on the page", a: "Hear the teacher's voice explaining it", p: "Remember discussing it with a friend", i: "Rely on your internal logic" },
        { q: "Which tool helps you stay organized?", v: "Color-coded planners", a: "Voice reminders on your phone", p: "Sharing a calendar with a group", i: "A personal diary or checklist" },
        { q: "When you're bored in class, you:", v: "Doodle on your notebook", a: "Hum or talk to yourself", p: "Try to start a conversation", i: "Daydream or think to yourself" },
        { q: "How do you like to spend your breaks?", v: "Watching videos or scrolling photos", a: "Listening to music", p: "Chatting with your group", i: "Sitting somewhere quiet" },
        { q: "When using technology, you prefer:", v: "Visually rich apps (Instagram/YT)", a: "Audio apps (Spotify/Podcasts)", p: "Social apps (Messenger/Discord)", i: "Information apps (News/Wiki)" },
        { q: "What describes your notes?", v: "Neat, with highlights and drawings", a: "Brief, focusing on keywords", p: "Shared with or borrowed from others", i: "Detailed and thorough" },
        { q: "How do you respond to feedback?", v: "Prefer seeing written comments", a: "Prefer a verbal one-on-one", p: "Prefer a group critique", i: "Prefer to read it privately" },
        { q: "What makes a teacher effective for you?", v: "Their use of visual aids", a: "Their ability to tell stories", p: "Their encouragement of interaction", i: "Their respect for quiet work" },
        { q: "When you get a new gadget, you:", v: "Look at the diagrams in the manual", a: "Ask someone how it works", p: "Figure it out with a friend", i: "Read the instructions cover-to-cover" },
        { q: "How do you prefer to share your knowledge?", v: "Making a video or slideshow", a: "Speaking in front of the class", p: "Leading a small workshop", i: "Writing an essay or report" },
        { q: "What is your main goal when studying?", v: "To see the 'big picture'", a: "To understand the explanation", p: "To collaborate on the answer", i: "To master the topic independently" }
    ];

    function validate() {
        if(!document.getElementById('stuAge').value || !document.getElementById('stuGender').value) {
            alert("Age and Gender are required!"); return;
        }
        document.getElementById('privacyModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('privacyModal').style.display = 'none'; }
    function confirmProceed() { closeModal(); nav('pg3'); }

    function nav(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function toggleDark() { document.body.classList.toggle('dark-mode'); }

    window.onload = function() {
        const container = document.getElementById('q-container');
        questions.forEach((item, i) => {
            container.innerHTML += `
                <div class="q-wrapper">
                    <p><strong>${i+1}. ${item.q}</strong></p>
                    <label class="option-box"><input type="radio" name="q${i}" value="visual" required> ${item.v}</label>
                    <label class="option-box"><input type="radio" name="q${i}" value="auditory" required> ${item.a}</label>
                    <label class="option-box"><input type="radio" name="q${i}" value="interpersonal" required> ${item.p}</label>
                    <label class="option-box"><input type="radio" name="q${i}" value="independent" required> ${item.i}</label>
                </div>`;
        });
    };

    function updateProg() {
        const data = new FormData(document.getElementById('styleForm'));
        const count = Array.from(data.keys()).length;
        document.getElementById('pBar').style.width = (count / 25 * 100) + "%";
    }

    async function finish() {
        const data = new FormData(document.getElementById('styleForm'));
        const scores = { visual:0, auditory:0, interpersonal:0, independent:0 };
        let total = 0;
        for(let v of data.values()) { scores[v]++; total++; }

        if(total < 25) { alert("Please answer all 25 questions!"); return; }

        const top = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
        const resultLabel = top.toUpperCase() + " LEARNER";

        const btn = document.getElementById('finishBtn');
        btn.innerText = "SAVING DATA..."; btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `name=${encodeURIComponent(document.getElementById('stuName').value || "Anonymous")}&age=${document.getElementById('stuAge').value}&gender=${document.getElementById('stuGender').value}&result=${encodeURIComponent(resultLabel)}`
            });
            document.getElementById('resBox').style.display = 'block';
            document.getElementById('resTitle').innerText = resultLabel;
            document.getElementById('resDesc').innerText = "Data saved. Good luck with your contest entry!";
            document.getElementById('resBox').scrollIntoView({behavior: 'smooth'});
        } catch (e) { alert("Saved locally, but connection failed."); }
    }
</script>
</body>
</html>
